<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title> Calculadora </title>
    <style>

        body { 
            font-family: Arial, sans-serif; 
            margin: 50px; 
            background-color: #f9f9f9;
        }

        
        input { 
            width: 100px; 
            padding: 8px; 
            font-size: 16px; 
            margin: 5px; 
            border: 1px solid #ccc;
            border-radius: 4px;
        }

     
        button { 
            padding: 10px 18px; 
            font-size: 16px; 
            margin: 5px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            color: white; 
        }


        .btn-soma { 
            background-color: #a3f1b6; /* Verde */
        }
        
        .btn-subtracao { 
            background-color: #d4747e; /* Vermelho */
        }
        
        .btn-multiplicacao { 
            background-color: #ffd498; /* Laranja */
        }
        
        .btn-divisao { 
            background-color: #aecef1; /* Azul */
        }

       
        button:hover {
            opacity: 0.9;
        }

        #resultado { 
            margin-top: 20px;
            font-size: 22px;
            color: #333; 
        }
    </style>
</head>
<body>

    <h2>Calculadora</h2>

    <input type="number" id="numero1" placeholder="Número 1">
    <input type="number" id="numero2" placeholder="Número 2">

    <br><br>

    <button class="btn-soma" onclick="somar()">Somar (+)</button>
    <button class="btn-subtracao" onclick="subtrair()">Subtrair (-)</button>
    <button class="btn-multiplicacao" onclick="multiplicar()">Multiplicar (*)</button>
    <button class="btn-divisao" onclick="dividir()">Dividir (/)</button>

    <h3 id="resultado">Resultado: </h3>

    <script src="Calculadora.js"></script>
</body>
</html>
